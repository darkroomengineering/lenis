version: 2
updates:
  # Track new versions of GitHub Actions. Dependabot rewrites SHA-pinned actions
  # back to the new SHA, preserving the pinning policy in release.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions:
        patterns:
          - "*"

  # Track advisories on npm dev dependencies. Grouped to reduce PR noise.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Peer deps — bumping these in this repo doesn't change what consumers get.
      - dependency-name: "react"
      - dependency-name: "vue"
      - dependency-name: "@nuxt/kit"
