name: Release

# Publishes `lenis` to npm with build provenance and OIDC-based Trusted Publishing.
# No long-lived NPM_TOKEN exists in this repository or in GitHub Actions secrets:
# the npm CLI exchanges a short-lived GitHub OIDC token for a publish credential at
# the moment of publish, scoped to this workflow file in this repository.
#
# Prerequisites (one-time setup on npmjs.com, see SECURITY.md):
#   - Configure `lenis` with a Trusted Publisher pointing at:
#       repository:    darkroomengineering/lenis
#       workflow file: .github/workflows/release.yml
#   - Revoke every classic / automation npm token after the first successful run.

on:
  push:
    tags:
      - 'v*'

# Minimum permissions for the whole workflow. The publish job widens to id-token:write.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # Required for npm Trusted Publishing + provenance attestations.

    steps:
      # Restrict outbound network from the runner so a compromised dep can't exfiltrate.
      # Start in `audit` mode; tighten to `block` after observing allowed endpoints.
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      # Refuse to publish if the git tag and package.json version disagree.
      # Prevents an attacker who can push a tag from publishing an arbitrary version.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Refuse to publish if dist/ is missing or empty after the build.
      - name: Verify build output
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::dist/ is missing or empty after build"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
